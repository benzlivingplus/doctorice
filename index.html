     ║  🗺️  วาง Google My Maps URL ตรงนี้             ║

<script>
const MAP_EMBED_URL = "https://www.google.com/maps/d/u/0/embed?mid=1h9gdwCf5uG5qQCs2NtV-0j3ryCTL-qo&ehbc=2E312F&ll=14.331884174159777, 100.64004753035863&z=12";

<!-- ████████████████████████████████████████████████
     📄 จำนวน card ต่อหน้า — แก้ตรงนี้ที่เดียว
     ████████████████████████████████████████████████ -->
<script>
const CARDS_PER_PAGE = 6;
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+Thai:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --maroon: #6E1423; --maroon-deep: #45050F; --maroon-tint: rgba(110,20,35,0.08);
    --paper: #FFFFFF; --paper-warm: #FAF7F4; --line: #E7E0D8;
    --ink: #15110F; --ink-soft: #3A322C;
    --text-muted: #8C8076; --text-subtle: #B3A99C;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink-soft); min-height:100vh; overflow-x:hidden; }
  #google_translate_element { display:inline-block; }
  .goog-te-gadget-simple { background:transparent !important; border:1px solid rgba(110,20,35,0.35) !important; border-radius:3px !important; padding:4px 10px !important; cursor:pointer; }
  .goog-te-gadget-simple span, .goog-te-gadget-simple .goog-te-menu-value span { color:var(--maroon) !important; font-family:'DM Sans',sans-serif !important; font-size:12px !important; letter-spacing:0.1em !important; }
  .goog-te-gadget-simple .goog-te-menu-value span:last-child { display:none !important; }
  .goog-te-banner-frame { display:none !important; }
  body { top:0 !important; }
  .top-nav { position:fixed; top:0; left:0; right:0; z-index:100; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; background:linear-gradient(to bottom,rgba(255,255,255,0.96),rgba(255,255,255,0)); backdrop-filter:blur(8px); }
  .nav-brand { font-family:'Cormorant Garamond','Noto Serif Thai',serif; font-size:0.95rem; font-weight:300; letter-spacing:0.2em; color:var(--maroon); text-transform:uppercase; }
  .hero { position:relative; padding:8rem 2rem 2rem; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; overflow:hidden; }
  .hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 80% 60% at 50% 0%,var(--maroon-tint) 0%,transparent 60%); pointer-events:none; }
  .hero-ornament { display:flex; align-items:center; gap:1.5rem; margin-bottom:2.5rem; opacity:0; animation:fadeUp 0.8s 0.2s ease forwards; }
  .hero-ornament .line { width:60px; height:1px; background:var(--maroon); opacity:0.7; }
  .hero-ornament span { font-size:11px; font-weight:500; letter-spacing:0.3em; color:var(--maroon); text-transform:uppercase; }
  .hero-greeting { font-family:'Cormorant Garamond','Noto Serif Thai',serif; font-size:clamp(1rem,2vw,1.2rem); font-weight:300; font-style:italic; color:var(--text-muted); margin-bottom:1rem; opacity:0; animation:fadeUp 0.8s 0.4s ease forwards; }
  .hero-title { font-family:'Cormorant Garamond','Noto Serif Thai',serif; font-size:clamp(3rem,8vw,6rem); font-weight:300; line-height:1.1; margin-bottom:0.5rem; color:var(--ink); opacity:0; animation:fadeUp 0.8s 0.5s ease forwards; }
  .hero-title .accent { color:var(--maroon); font-style:italic; }
  section { padding:6rem 2rem; max-width:1200px; margin:0 auto; }
  .section-label { display:flex; align-items:center; gap:1rem; margin-bottom:1rem; }
  .section-label .line { width:30px; height:1px; background:var(--maroon); opacity:0.7; }
  .section-label span { font-size:11px; letter-spacing:0.3em; color:var(--maroon); text-transform:uppercase; }
  .section-title { font-family:'Cormorant Garamond','Noto Serif Thai',serif; font-size:clamp(1.8rem,4vw,3rem); font-weight:300; margin-bottom:3rem; line-height:1.2; color:var(--ink); }
  .map-wrap { border-radius:4px; overflow:hidden; border:1px solid var(--line); }
  .map-wrap iframe { width:100%; height:420px; border:none; display:block; }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:10px; }
  .property-card { background:var(--paper-warm); border:1px solid var(--line); cursor:pointer; position:relative; overflow:hidden; transition:transform 0.4s ease, box-shadow 0.4s ease; text-decoration:none; color:inherit; display:block; }
  .property-card:hover { transform:translateY(-4px); box-shadow:0 16px 32px -16px rgba(21,17,15,0.18); }
  .card-img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; transition:transform 0.6s ease; background:var(--line); }
  .property-card:hover .card-img { transform:scale(1.03); }
  .card-img-placeholder { width:100%; aspect-ratio:4/3; background:var(--line); display:flex; align-items:center; justify-content:center; color:var(--text-subtle); font-size:12px; letter-spacing:0.1em; }
  .card-body { padding:1.5rem; border-top:1px solid var(--line); }
  .card-tag { font-size:10px; letter-spacing:0.25em; color:var(--maroon); text-transform:uppercase; margin-bottom:0.6rem; }
  .card-name { font-family:'Cormorant Garamond','Noto Serif Thai',serif; font-size:1.4rem; font-weight:400; margin-bottom:1rem; line-height:1.2; color:var(--ink); }
  .card-info-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .info-item { font-size:12px; color:var(--text-muted); font-weight:500; letter-spacing:0.05em; }
  .info-sep { font-size:11px; color:var(--text-subtle); }
  .info-price { font-size:12px; font-weight:600; color:var(--maroon); letter-spacing:0.05em; }
  .card-arrow { position:absolute; bottom:1.5rem; right:1.5rem; width:36px; height:36px; border:1px solid var(--line); border-radius:50%; display:flex; align-items:center; justify-content:center; transition:all 0.3s; background:var(--paper); }
  .property-card:hover .card-arrow { background:var(--maroon); border-color:var(--maroon); }
  .card-arrow svg { width:14px; height:14px; stroke:var(--ink); transition:stroke 0.3s; }
  .property-card:hover .card-arrow svg { stroke:var(--paper); }
  /* ── PAGINATION ── */
  .pg-wrap { display:flex; gap:8px; justify-content:center; margin-top:2rem; }
  .pg-btn { padding:8px 16px; border:1px solid var(--line); color:var(--text-muted); font-size:13px; font-family:'DM Sans',sans-serif; background:transparent; cursor:pointer; transition:all 0.2s; }
  .pg-btn.active { border-color:var(--maroon); color:var(--maroon); }
  .pg-btn:hover { border-color:var(--maroon); color:var(--maroon); }
  footer { border-top:1px solid var(--line); padding:3rem 2rem; text-align:center; }
  .footer-brand { font-family:'Cormorant Garamond','Noto Serif Thai',serif; font-size:1.3rem; font-weight:300; letter-spacing:0.2em; color:var(--maroon); text-transform:uppercase; margin-bottom:0.5rem; }
  .footer-copy { font-size:11px; color:var(--text-subtle); letter-spacing:0.05em; line-height:1.8; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @media(max-width:640px) { .cards-grid{grid-template-columns:1fr;gap:8px} section{padding:4rem 1.2rem} }
</style>
</head>
<body>

<nav class="top-nav">
  <div class="nav-brand notranslate">The Living Plus</div>
  <div id="google_translate_element"></div>
</nav>

<div class="hero">
  <div class="hero-ornament">
    <span class="line"></span>
    <span>คัดสรรพิเศษเฉพาะท่าน</span>
    <span class="line"></span>
  </div>
  <p class="hero-greeting">คอลเลกชันส่วนตัว จัดเตรียมไว้สำหรับ</p>
  <h1 class="hero-title">คุณ <span class="accent">หมอไอซ์</span></h1>
</div>

<section id="map-zone" style="display:none;">
  <div class="section-label"><span class="line"></span><span>ทำเลที่ตั้ง</span></div>
  <h2 class="section-title">ตำแหน่งทรัพย์</h2>
  <div class="map-wrap" id="map-wrap"></div>
</section>

<section id="properties">
  <div class="section-label"><span class="line"></span><span>ยูนิตที่คัดสรรไว้</span></div>
  <h2 class="section-title">ทรัพย์สำหรับคุณ</h2>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="pg-wrap" id="pagination"></div>
</section>

<footer>
  <div class="footer-brand notranslate">The Living Plus</div>
  <div class="footer-copy notranslate">
    &copy; 2026 THE LIVING PLUS. All rights reserved.<br>
    Operated by K Corp Co., Ltd.
  </div>
</footer>

<script>
// ── MAP ───────────────────────────────────────────────────────────────────
if (MAP_EMBED_URL && MAP_EMBED_URL.trim() !== '') {
  document.getElementById('map-zone').style.display = 'block';
  document.getElementById('map-wrap').innerHTML =
    `<iframe src="${MAP_EMBED_URL}" allowfullscreen loading="lazy"></iframe>`;
}

// ── PAGINATION (JS ล้วน ไม่ reload) ──────────────────────────────────────
const allVisible = ROOMS_DATA.filter(r => r["ราคา"] !== '');
const totalPages = Math.ceil(allVisible.length / CARDS_PER_PAGE);
let currentPage = 1;

function buildCard(room) {
  const a = document.createElement('a');
  a.className = 'property-card';
  a.href = room["ไฟล์"];
  const imgHTML = room["ภาพปก"]
    ? `<img class="card-img" src="${room["ภาพปก"]}" alt="${room["ชื่อ"]}" loading="lazy"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
       <div class="card-img-placeholder" style="display:none;">${room["ชื่อ"]}</div>`
    : `<div class="card-img-placeholder">${room["ชื่อ"]}</div>`;
  a.innerHTML = `
    ${imgHTML}
    <div class="card-body">
      <div class="card-tag notranslate">${room["ประเภททรัพย์"]}</div>
      <div class="card-name notranslate">${room["ชื่อ"]}</div>
      <div class="card-info-row">
        <span class="info-item">${room["ตร.ว."]} ตร.ว.</span>
        <span class="info-sep">|</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5;flex-shrink:0"><path d="M3 11V19M21 11V19M3 11C3 8 6 6 12 6C18 6 21 8 21 11M3 19H21M7 11V19M17 11V19"/></svg>
        <span class="info-item">${room["ห้องนอน"] || '—'}</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:0.5;flex-shrink:0"><path d="M4 12H20M4 12V18H20V12M4 12V8C4 6.9 4.9 6 6 6H10C11.1 6 12 6.9 12 8V12"/></svg>
        <span class="info-item">${room["ห้องน้ำ"] || '—'}</span>
        <span class="info-sep">|</span>
        <span class="info-price">${room["ราคา"]} บาท</span>
      </div>
      <div class="card-arrow">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </div>
    </div>`;
  return a;
}

function renderPage(page) {
  currentPage = page;
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const start = (page - 1) * CARDS_PER_PAGE;
  const pageRooms = allVisible.slice(start, start + CARDS_PER_PAGE);

  if (pageRooms.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;padding:4rem;text-align:center;color:var(--text-muted);font-size:13px;letter-spacing:0.1em;border:1px dashed rgba(110,20,35,0.25);">ยังไม่มีทรัพย์ที่แสดง</div>`;
  } else {
    pageRooms.forEach(room => grid.appendChild(buildCard(room)));
  }

  // update pagination buttons
  document.querySelectorAll('.pg-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i + 1 === page);
  });
}

// build pagination buttons
if (totalPages > 1) {
  const pg = document.getElementById('pagination');
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.className = 'pg-btn' + (i === 1 ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => renderPage(i);
    pg.appendChild(btn);
  }
}

// swipe support (mobile)
let swipeStartX = 0;
const cardGrid = document.getElementById('cards-grid');
cardGrid.addEventListener('touchstart', e => { swipeStartX = e.touches[0].clientX; }, { passive: true });
cardGrid.addEventListener('touchend', e => {
  const dx = swipeStartX - e.changedTouches[0].clientX;
  if (dx > 60 && currentPage < totalPages) renderPage(currentPage + 1);
  if (dx < -60 && currentPage > 1) renderPage(currentPage - 1);
}, { passive: true });

// initial render
renderPage(1);
</script>

<script>
window.addEventListener('load', function() {
  setTimeout(function() {
    var select = document.querySelector('.goog-te-combo');
    if (select) { select.value = 'en'; select.dispatchEvent(new Event('change')); }
  }, 800);
});
</script>

</body>
</html>
